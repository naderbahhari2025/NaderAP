<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NaderAP</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="mainLayout">

  <div id="diagramArea">
    <iframe
      src="diagram-viewer.html"
      loading="lazy"
      allowfullscreen>
    </iframe>
  </div>

  <div id="sidePanel">

    <!-- Anthem FIRST -->
    <div id="anthemControl">
      <span class="label-main">Anthem</span>

      <div class="toggleRow">
        <span class="toggleText">OFF</span>

        <label class="switch">
          <input type="checkbox" id="anthemToggle">
          <span class="slider"></span>
        </label>

        <span class="toggleText">ON</span>
      </div>
    </div>

    <!-- Details SECOND -->
    <h3>Details</h3>

    <div id="contentBox">
      <p id="defaultMessage">Click on a milestone to see details.</p>
      <div id="milestoneText"></div>
    </div>

  </div>

</div>

<audio id="anthem" preload="auto">
  <source src="anthem.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
